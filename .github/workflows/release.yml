name: Publish gem to rubygems.org

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with: { persist-credentials: false }
      - uses: ruby/setup-ruby@v1
        with: { bundler-cache: true }
      - uses: rubygems/release-gem@v1
